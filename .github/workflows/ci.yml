name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Pruebas Unitarias con Pytest + Cobertura
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ --ignore=tests/test_e2e.py --cov=app --cov-report=term-missing -v

  # ─────────────────────────────────────────────
  # Job 2: Pruebas E2E con Selenium
  # ─────────────────────────────────────────────
  e2e-tests:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run E2E tests (headless)
        run: |
          python -m pytest tests/test_e2e.py -v

  # ─────────────────────────────────────────────
  # Job 3: Compilar imagen Docker
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t expense-tracker:latest .

      - name: Verify Docker image
        run: |
          docker images expense-tracker:latest

  # ─────────────────────────────────────────────
  # Job 4: Reporte de Seguridad
  # ─────────────────────────────────────────────
  security-report:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run security audit
        run: |
          pip-audit --desc || true
